<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquor Inventory Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a08;
    --surface: #131310;
    --surface2: #1c1c18;
    --border: #2a2a24;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --amber: #d47c2e;
    --text: #e8e4d8;
    --text-dim: #888880;
    --red: #c44;
    --green: #5a9;
    --white: #f5f2e8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #1a1608 0%, #0a0a08 60%);
    border-bottom: 1px solid var(--gold);
    padding: 18px 28px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: .12em;
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(201,168,76,.35);
  }
  .logo span { color: var(--text-dim); font-size: 1rem; letter-spacing: .2em; display:block; margin-top:-6px; }
  .header-stats {
    display: flex; gap: 28px;
  }
  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 16px;
    text-align: center;
  }
  .stat-pill .val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--gold);
    display: block;
    line-height: 1;
  }
  .stat-pill .lbl {
    font-size: .65rem;
    letter-spacing: .12em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 28px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .search-wrap {
    position: relative; flex: 1; min-width: 200px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px 8px 36px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: .85rem;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-wrap::before {
    content: '⌕'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); font-size: 1.1rem;
  }
  select, .btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: .82rem;
    cursor: pointer;
    outline: none;
    transition: border-color .2s, background .2s;
  }
  select:focus, .btn:hover { border-color: var(--gold); }
  .btn-gold {
    background: var(--gold);
    color: #0a0a08;
    font-weight: 600;
    border-color: var(--gold);
  }
  .btn-gold:hover { background: var(--gold-light); border-color: var(--gold-light); }
  .btn-sm {
    padding: 4px 10px; font-size: .75rem; border-radius: 4px;
  }

  /* ── MODAL ── */
  .overlay {
    display: none;
    position: fixed; inset: 0; background: rgba(0,0,0,.75);
    z-index: 200; align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 28px 32px;
    width: 480px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--gold-light);
    letter-spacing: .08em;
    margin-bottom: 18px;
  }
  .form-row { margin-bottom: 14px; }
  .form-row label {
    display: block;
    font-size: .72rem; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 5px;
  }
  .form-row input, .form-row select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: .9rem;
    outline: none;
  }
  .form-row input:focus { border-color: var(--gold); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

  /* ── TABLE ── */
  .table-wrap {
    padding: 20px 28px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .82rem;
  }
  thead tr {
    background: var(--surface2);
  }
  th {
    font-family: 'DM Mono', monospace;
    font-size: .68rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--gold);
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--gold);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--gold-light); }
  th.sorted-asc::after { content: ' ▲'; }
  th.sorted-desc::after { content: ' ▼'; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  tbody tr:hover { background: var(--surface2); }
  td {
    padding: 9px 12px;
    font-family: 'DM Mono', monospace;
    vertical-align: middle;
    white-space: nowrap;
  }
  td.item-name {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    white-space: normal;
    max-width: 220px;
  }
  .unit-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: .7rem;
    color: var(--text-dim);
  }
  .qty-cell {
    display: flex; align-items: center; gap: 6px;
  }
  .qty-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); width: 22px; height: 22px;
    border-radius: 4px; cursor: pointer; font-size: .9rem;
    display: flex; align-items: center; justify-content: center;
    line-height: 1; transition: background .15s;
  }
  .qty-btn:hover { background: var(--gold); color: #000; border-color: var(--gold); }
  .qty-input {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); width: 50px; text-align: center;
    padding: 3px; border-radius: 4px;
    font-family: 'DM Mono', monospace; font-size: .85rem;
  }
  .qty-input:focus { border-color: var(--gold); outline: none; }
  .value-cell { color: var(--gold-light); font-weight: 500; }
  .low-stock { color: var(--amber); }
  .out-stock { color: var(--red); }
  .good-stock { color: var(--green); }

  td .action-btns { display: flex; gap: 5px; }

  /* ── CATEGORY TABS ── */
  .cat-tabs {
    padding: 0 28px;
    display: flex; gap: 6px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .cat-tab {
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text-dim); padding: 10px 14px; font-family: 'DM Sans', sans-serif;
    font-size: .8rem; cursor: pointer; letter-spacing: .05em;
    transition: color .2s, border-color .2s;
    white-space: nowrap;
  }
  .cat-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .cat-tab:hover { color: var(--text); }

  /* ── TOTAL BAR ── */
  .total-bar {
    background: var(--surface2);
    border-top: 1px solid var(--gold);
    padding: 12px 28px;
    display: flex; justify-content: flex-end; gap: 24px; align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: .85rem;
    color: var(--text-dim);
    position: sticky; bottom: 0;
  }
  .total-bar strong {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--gold-light);
    letter-spacing: .05em;
  }

  .no-results {
    text-align: center; padding: 60px; color: var(--text-dim);
    font-size: .9rem;
  }

  .tag {
    display: inline-block;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px;
    font-size: .68rem; color: var(--text-dim); margin-left: 4px;
  }

  /* ── PURCHASE / ISSUED / BALANCE COLUMNS ── */
  .purchase-cell { color: #6bcf8a; font-weight: 500; }
  .issued-cell { color: var(--amber); font-weight: 500; }
  .balance-cell { color: var(--gold-light); font-weight: 600; }
  .balance-low { color: var(--red) !important; }
  .balance-ok { color: var(--green) !important; }

  /* ── PURCHASE HISTORY MODAL ── */
  .ph-entry {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
    font-size: .8rem;
  }
  .ph-entry .ph-meta { color: var(--text-dim); font-size: .72rem; margin-top: 3px; }
  .ph-del { float: right; background: none; border: none; color: var(--red); cursor: pointer; font-size: .85rem; }

  /* ── ISSUED HISTORY MODAL ── */
  .issued-entry {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
    font-size: .8rem;
  }
  .issued-entry .issued-meta { color: var(--text-dim); font-size: .72rem; margin-top: 3px; }
  .is-del { float: right; background: none; border: none; color: var(--red); cursor: pointer; font-size: .85rem; }

  /* tabs inside modal */
  .modal-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .modal-tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-dim);
    padding: 8px 18px; font-family: 'DM Sans', sans-serif; font-size: .82rem; cursor: pointer; }
  .modal-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
</style>
</head>
<body>

<!-- SIMPLE APP MODE -->
<meta name="theme-color" content="#0a0a08">
<style>
.install-banner{
position:fixed;bottom:15px;left:50%;transform:translateX(-50%);
background:#c9a84c;color:#000;padding:10px 16px;border-radius:8px;
font-weight:600;z-index:999;font-family:sans-serif}
</style>

<div class="install-banner">
👉 Chrome menu (⋮) → Add to Home Screen
</div>


<header>
  <div class="logo">Liquor Inventory<span>Feb 15, 2026</span></div>
  <div class="header-stats">
    <div class="stat-pill">
      <span class="val" id="stat-items">—</span>
      <span class="lbl">Items</span>
    </div>
    <div class="stat-pill">
      <span class="val" id="stat-total-qty">—</span>
      <span class="lbl">Total Units</span>
    </div>
    <div class="stat-pill">
      <span class="val" id="stat-total-val">—</span>
      <span class="lbl">Total Value</span>
    </div>
    <div class="stat-pill">
      <span class="val" id="stat-low" style="color:var(--amber)">—</span>
      <span class="lbl">Low Stock</span>
    </div>
  </div>
</header>

<div class="cat-tabs" id="catTabs"></div>

<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search item name…">
  </div>
  <select id="sortSelect">
    <option value="">Sort by…</option>
    <option value="name-asc">Name A→Z</option>
    <option value="name-desc">Name Z→A</option>
    <option value="qty-desc">Qty High→Low</option>
    <option value="qty-asc">Qty Low→High</option>
    <option value="value-desc">Value High→Low</option>
    <option value="value-asc">Value Low→High</option>
  </select>
  <button class="btn btn-gold" onclick="openAddModal()">+ Add Item</button>
  <button class="btn" onclick="exportCSV()">Export CSV</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('no')">#</th>
        <th onclick="sortBy('name')">Item Name</th>
        <th onclick="sortBy('unit')">Unit</th>
        <th onclick="sortBy('qty')">Opening Stock</th>
        <th onclick="sortBy('purchased')">Purchased</th>
        <th onclick="sortBy('issued')">Issued</th>
        <th onclick="sortBy('balance')">Balance</th>
        <th onclick="sortBy('unitPrice')">Unit Price</th>
        <th onclick="sortBy('value')">Value</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="no-results" id="noResults" style="display:none">No items found.</div>
</div>

<div class="total-bar">
  <span>Filtered Items: <strong id="filtered-count">0</strong></span>
  <span>Filtered Value: <strong id="filtered-value">0.00</strong></span>
</div>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">Add Item</h2>
    <div class="form-row">
      <label>Item Name</label>
      <input type="text" id="f-name" placeholder="e.g. Jack Daniels 750ML">
    </div>
    <div class="form-row">
      <label>Category</label>
      <select id="f-cat">
        <option>Beer & Soft Drinks</option>
        <option>Whisky</option>
        <option>Vodka</option>
        <option>Gin</option>
        <option>Rum</option>
        <option>Tequila</option>
        <option>Wine</option>
        <option>Brandy & Cognac</option>
        <option>Liqueur</option>
        <option>Sparkling</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-row">
      <label>Unit</label>
      <input type="text" id="f-unit" placeholder="e.g. 750, 330*24">
    </div>
    <div class="form-row">
      <label>Opening Stock Quantity</label>
      <input type="number" id="f-qty" min="0" placeholder="0">
    </div>
    <div class="form-row">
      <label>Unit Price (AED)</label>
      <input type="number" id="f-price" step="0.01" min="0" placeholder="0.00">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<!-- PURCHASE MODAL -->
<div class="overlay" id="purchaseModal">
  <div class="modal" style="width:560px">
    <h2 id="purchaseModalTitle">Purchase Log</h2>
    <div class="modal-tabs">
      <button class="modal-tab active" id="ptab-add" onclick="switchPTab('add')">+ Add Purchase</button>
      <button class="modal-tab" id="ptab-history" onclick="switchPTab('history')">History</button>
    </div>
    <div id="ptab-add-content">
      <div class="form-row">
        <label>Delivery Note #</label>
        <input type="text" id="p-dn" placeholder="e.g. DN-00340">
      </div>
      <div class="form-row">
        <label>Date</label>
        <input type="date" id="p-date">
      </div>
      <div class="form-row">
        <label>Quantity Received</label>
        <input type="number" id="p-qty" min="1" placeholder="0">
      </div>
      <div class="form-row">
        <label>Notes</label>
        <input type="text" id="p-notes" placeholder="Optional">
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closePurchaseModal()">Cancel</button>
        <button class="btn btn-gold" onclick="savePurchase()">Add Purchase</button>
      </div>
    </div>
    <div id="ptab-history-content" style="display:none">
      <div id="purchaseHistoryList"></div>
      <div class="modal-actions">
        <button class="btn" onclick="closePurchaseModal()">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- ISSUED MODAL -->
<div class="overlay" id="issuedModal">
  <div class="modal" style="width:560px">
    <h2 id="issuedModalTitle">Issued Log</h2>
    <div class="modal-tabs">
      <button class="modal-tab active" id="itab-add" onclick="switchITab('add')">+ Issue Stock</button>
      <button class="modal-tab" id="itab-history" onclick="switchITab('history')">History</button>
    </div>
    <div id="itab-add-content">
      <div class="form-row">
        <label>Issued To / Reference</label>
        <input type="text" id="i-ref" placeholder="e.g. Bar, Event, Kitchen">
      </div>
      <div class="form-row">
        <label>Date</label>
        <input type="date" id="i-date">
      </div>
      <div class="form-row">
        <label>Quantity Issued</label>
        <input type="number" id="i-qty" min="1" placeholder="0">
      </div>
      <div class="form-row">
        <label>Notes</label>
        <input type="text" id="i-notes" placeholder="Optional">
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeIssuedModal()">Cancel</button>
        <button class="btn" style="background:var(--amber);color:#000;border-color:var(--amber)" onclick="saveIssued()">Issue Stock</button>
      </div>
    </div>
    <div id="itab-history-content" style="display:none">
      <div id="issuedHistoryList"></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeIssuedModal()">Close</button>
      </div>
    </div>
  </div>
</div>

if (!localStorage.getItem('prippa_inventory_v3')) {
  localStorage.removeItem('prippa_inventory');
  localStorage.setItem('prippa_inventory_v3', '1');
}
// Load from localStorage or use defaults
let items = JSON.parse(localStorage.getItem('prippa_inventory') || 'null') || RAW.map(d => ({...d, value: parseFloat((d.qty * d.unitPrice).toFixed(2))}));

// purchases: {itemNo, date, dn, qty, notes}[]
let purchases = JSON.parse(localStorage.getItem('prippa_purchases') || '[]');
// issued: {itemNo, date, ref, qty, notes}[]
let issuedLog = JSON.parse(localStorage.getItem('prippa_issued') || '[]');

let currentCat = 'All';
let searchTerm = '';
let sortField = '';
let sortDir = 1;
let editId = null;
let purchaseItemNo = null;
let issuedItemNo = null;

function save() { localStorage.setItem('prippa_inventory', JSON.stringify(items)); }
function savePurchases() { localStorage.setItem('prippa_purchases', JSON.stringify(purchases)); }
function saveIssuedLog() { localStorage.setItem('prippa_issued', JSON.stringify(issuedLog)); }

function getPurchased(no) { return purchases.filter(p => p.itemNo === no).reduce((s,p) => s + p.qty, 0); }
function getIssued(no) { return issuedLog.filter(i => i.itemNo === no).reduce((s,i) => s + i.qty, 0); }
function getBalance(item) { return item.qty + getPurchased(item.no) - getIssued(item.no); }

// ── CATEGORY TABS ──────────────────────────────────────────────────────────
function buildCatTabs() {
  const cats = ['All', ...new Set(items.map(i => i.cat).sort())];
  const container = document.getElementById('catTabs');
  container.innerHTML = cats.map(c =>
    `<button class="cat-tab${c===currentCat?' active':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}

function setCat(c) { currentCat = c; buildCatTabs(); renderTable(); }

// ── FILTER & SORT ──────────────────────────────────────────────────────────
function getFiltered() {
  let list = items.map(i => ({...i, purchased: getPurchased(i.no), issued: getIssued(i.no), balance: getBalance(i)}));
  if (currentCat !== 'All') list = list.filter(i => i.cat === currentCat);
  if (searchTerm) { const s = searchTerm.toLowerCase(); list = list.filter(i => i.name.toLowerCase().includes(s)); }
  if (sortField) {
    list.sort((a,b) => {
      let av = a[sortField], bv = b[sortField];
      if (typeof av === 'string') return av.localeCompare(bv) * sortDir;
      return (av - bv) * sortDir;
    });
  }
  return list;
}

function sortBy(field) {
  if (sortField === field) sortDir *= -1;
  else { sortField = field; sortDir = 1; }
  document.querySelectorAll('th').forEach(t => t.classList.remove('sorted-asc','sorted-desc'));
  event.target.classList.add(sortDir===1?'sorted-asc':'sorted-desc');
  renderTable();
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderTable() {
  const list = getFiltered();
  const tbody = document.getElementById('tableBody');
  const noResults = document.getElementById('noResults');

  if (!list.length) { tbody.innerHTML = ''; noResults.style.display = 'block'; }
  else {
    noResults.style.display = 'none';
    tbody.innerHTML = list.map(item => {
      const val = (item.balance * item.unitPrice).toFixed(2);
      const balClass = item.balance === 0 ? 'balance-low' : item.balance <= 3 ? 'balance-low' : 'balance-ok';
      return `<tr>
        <td style="color:var(--text-dim);font-size:.75rem">${item.no}</td>
        <td class="item-name">${item.name} <span class="tag">${item.cat}</span></td>
        <td><span class="unit-badge">${item.unit}</span></td>
        <td style="color:var(--text-dim)">${item.qty}</td>
        <td class="purchase-cell">
          <span style="cursor:pointer;text-decoration:underline dotted" onclick="openPurchaseModal(${item.no})">${item.purchased}</span>
          <button class="qty-btn" style="margin-left:4px" onclick="openPurchaseModal(${item.no})" title="Add Purchase">+P</button>
        </td>
        <td class="issued-cell">
          <span style="cursor:pointer;text-decoration:underline dotted" onclick="openIssuedModal(${item.no})">${item.issued}</span>
          <button class="qty-btn" style="margin-left:4px" onclick="openIssuedModal(${item.no})" title="Issue Stock">+I</button>
        </td>
        <td class="balance-cell ${balClass}">${item.balance}</td>
        <td style="color:var(--text-dim)">AED ${item.unitPrice.toFixed(2)}</td>
        <td class="value-cell">AED ${val}</td>
        <td>
          <div class="action-btns">
            <button class="btn btn-sm" onclick="openEditModal(${item.no})">Edit</button>
            <button class="btn btn-sm" style="border-color:var(--red);color:var(--red)" onclick="deleteItem(${item.no})">Del</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  const allItems = items;
  const totalQty = allItems.reduce((s,i) => s + getBalance(i), 0);
  const totalVal = allItems.reduce((s,i) => s + getBalance(i) * i.unitPrice, 0);
  const lowCount = allItems.filter(i => getBalance(i) <= 3 && getBalance(i) > 0).length;
  document.getElementById('stat-items').textContent = allItems.length;
  document.getElementById('stat-total-qty').textContent = totalQty.toLocaleString();
  document.getElementById('stat-total-val').textContent = 'AED ' + totalVal.toFixed(0);
  document.getElementById('stat-low').textContent = lowCount;

  const filtVal = list.reduce((s,i) => s + i.balance * i.unitPrice, 0);
  document.getElementById('filtered-count').textContent = list.length;
  document.getElementById('filtered-value').textContent = 'AED ' + filtVal.toFixed(2);
}

// ── QUANTITY (legacy +/- removed, balance drives display) ──────────────────
function adjustQty(no, delta) {
  const item = items.find(i => i.no === no);
  if (item) { item.qty = Math.max(0, item.qty + delta); save(); renderTable(); }
}
function setQty(no, val) {
  const item = items.find(i => i.no === no);
  if (item) { item.qty = Math.max(0, parseInt(val) || 0); save(); renderTable(); }
}

// ── DELETE ─────────────────────────────────────────────────────────────────
function deleteItem(no) {
  if (!confirm('Delete this item?')) return;
  items = items.filter(i => i.no !== no);
  purchases = purchases.filter(p => p.itemNo !== no);
  issuedLog = issuedLog.filter(i => i.itemNo !== no);
  save(); savePurchases(); saveIssuedLog(); buildCatTabs(); renderTable();
}

// ── ADD / EDIT MODAL ───────────────────────────────────────────────────────
function openAddModal() {
  editId = null;
  document.getElementById('modalTitle').textContent = 'Add New Item';
  ['f-name','f-unit','f-qty','f-price'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modal').classList.add('open');
}
function openEditModal(no) {
  const item = items.find(i => i.no === no);
  if (!item) return;
  editId = no;
  document.getElementById('modalTitle').textContent = 'Edit Item';
  document.getElementById('f-name').value = item.name;
  document.getElementById('f-cat').value = item.cat;
  document.getElementById('f-unit').value = item.unit;
  document.getElementById('f-qty').value = item.qty;
  document.getElementById('f-price').value = item.unitPrice;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  const cat = document.getElementById('f-cat').value;
  const unit = document.getElementById('f-unit').value.trim();
  const qty = parseInt(document.getElementById('f-qty').value) || 0;
  const unitPrice = parseFloat(document.getElementById('f-price').value) || 0;
  if (!name) { alert('Item name required'); return; }
  if (editId !== null) {
    const item = items.find(i => i.no === editId);
    if (item) { item.name=name; item.cat=cat; item.unit=unit; item.qty=qty; item.unitPrice=unitPrice; }
  } else {
    const maxNo = items.reduce((m,i) => Math.max(m,i.no),0);
    items.push({no:maxNo+1, name, cat, unit, qty, unitPrice});
  }
  save(); closeModal(); buildCatTabs(); renderTable();
}

// ── PURCHASE MODAL ─────────────────────────────────────────────────────────
function openPurchaseModal(no) {
  purchaseItemNo = no;
  const item = items.find(i => i.no === no);
  document.getElementById('purchaseModalTitle').textContent = 'Purchase Log — ' + item.name;
  document.getElementById('p-date').value = new Date().toISOString().split('T')[0];

function closePurchaseModal() { document.getElementById('purchaseModal').classList.remove('open'); }
function switchPTab(t) {
  document.getElementById('ptab-add').classList.toggle('active', t==='add');
  document.getElementById('ptab-history').classList.toggle('active', t==='history');
  document.getElementById('ptab-add-content').style.display = t==='add' ? '' : 'none';
  document.getElementById('ptab-history-content').style.display = t==='history' ? '' : 'none';
  if (t === 'history') renderPurchaseHistory();
}
function renderPurchaseHistory() {
  const list = purchases.filter(p => p.itemNo === purchaseItemNo).sort((a,b) => b.date.localeCompare(a.date));
  const el = document.getElementById('purchaseHistoryList');
  if (!list.length) { el.innerHTML = '<p style="color:var(--text-dim);font-size:.85rem">No purchases recorded.</p>'; return; }
  el.innerHTML = list.map((p,idx) => `<div class="ph-entry">
    <button class="ph-del" onclick="deletePurchase('${p.id}')">✕</button>
    <strong style="color:var(--green)">+${p.qty}</strong> units &nbsp;|&nbsp; DN: ${p.dn||'—'}
    <div class="ph-meta">${p.date} &nbsp;•&nbsp; ${p.notes||''}</div>
  </div>`).join('');
}
function savePurchase() {
  const qty = parseInt(document.getElementById('p-qty').value) || 0;
  if (qty <= 0) { alert('Quantity must be > 0'); return; }
  const entry = {
    id: Date.now().toString(),
    itemNo: purchaseItemNo,
    date: document.getElementById('p-date').value,
    dn: document.getElementById('p-dn').value.trim(),
    qty,
    notes: document.getElementById('p-notes').value.trim()
  };
  purchases.push(entry);
  savePurchases(); closePurchaseModal(); renderTable();
}
function deletePurchase(id) {
  if (!confirm('Remove this purchase entry?')) return;
  purchases = purchases.filter(p => p.id !== id);
  savePurchases(); renderPurchaseHistory(); renderTable();
}

// ── EXPORT CSV ─────────────────────────────────────────────────────────────
function exportCSV() {
  const list = getFiltered();
  const rows = [['#','Name','Category','Unit','Opening Stock','Purchased','Issued','Balance','Unit Price','Value']];
  list.forEach(i => rows.push([i.no, i.name, i.cat, i.unit, i.qty, i.purchased, i.issued, i.balance, i.unitPrice.toFixed(2), (i.balance*i.unitPrice).toFixed(2)]));
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'Liquor_Inventory.csv';
  a.click();
}
